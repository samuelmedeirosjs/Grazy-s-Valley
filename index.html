<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Eu Te Amo" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <link rel="apple-touch-icon" href="assets/icons/icon-192.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />

    <title>EU TE AMO</title>

    <link rel="icon" href="/favicon.ico" />
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <div id="rotate-warning">
      <div>
        <h2>Vire o celular</h2>
        <p>Para jogar melhor, use o celular na horizontal.</p>
      </div>
    </div>
    <div id="pwa-popup" class="pwa-popup">
      <div class="pwa-card">
        <button id="pwa-close">×</button>
        <h2>Instale o jogo</h2>
        <img id="shareImage" src="./assets/icons/share.png" alt="">
        <p id="pwa-text"></p>
        <button id="pwa-install">Adicionar ao dispositivo</button>
      </div>
    </div>

    <main id="game-wrapper">
      <!-- O canvas existe apenas aqui -->
      <canvas id="game"></canvas>
    </main>

    <!-- Botão final fora do canvas -->
    <button id="restart-button" type="button">Reiniciar</button>

    <script src="https://unpkg.com/kaboom@3000/dist/kaboom.js"></script>
    <script src="./main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("./service-worker.js");
        });
      }
    </script>
  </body>
</html>
